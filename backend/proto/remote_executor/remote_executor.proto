syntax = "proto3";
package dagflow.remote_executor;
option go_package = "github.com/caiflower/dagflow/proto/remote_executor";

service RemoteExecutor {
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

message ExecuteRequest {
  string func_name = 1;
  bytes input = 2;
  string task_id = 3;
}

message ExecuteResponse {
  bytes output = 1;
  string error = 2;
}

message HealthRequest {}
message HealthResponse { bool ok = 1; }

service NodeRegistry {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
}

message RegisterRequest {
  string node_id = 1;
  string address = 2;
  repeated string functions = 3;
}

message RegisterResponse { bool ok = 1; }

message HeartbeatRequest { string node_id = 1; }
message HeartbeatResponse { bool ok = 1; }

message NodeDetail {
  string node_id = 1;
  string address = 2;
  repeated string functions = 3;
  string status = 4;
  int64 last_heartbeat = 5;
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeDetail items = 1;
  int32 total = 2;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeDetail node = 1;
}
