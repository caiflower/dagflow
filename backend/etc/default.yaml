# DAGFlow 基础设施配置

logger:
  level: INFO

cluster:
  mode: cluster
  nodes:
    - name: dagflow-node
      ip: 127.0.0.1
      port: 9090
      local: true

web:
  - name: dagflow
    addr: "0.0.0.0:8080"
    enable_pprof: true
    enable_metrics: false

database:
  - name: dagflow
    dialect: sqlite
    url: "./dagflow.db"
    dbName: dagflow
    charset: utf8mb4
    maxOpen: 50
    maxIdle: 10
    debug: true

redis:
  - name: dagflow
    addrs:
      - "127.0.0.1:6379"
    password: ""
    db: 0
